<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Street Clash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      background: #050816;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 16px 0 4px;
      text-align: center;
    }
    p {
      margin: 0 0 12px;
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
    }
    #gameContainer {
      position: relative;
    }
    canvas {
      background: #111827;
      border: 2px solid #4b5563;
      border-radius: 8px;
      image-rendering: pixelated;
    }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      color: #e5e7eb;
      font-size: 14px;
      text-shadow: 0 0 4px #000;
    }
    #gameOver {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      color: #f9fafb;
      font-size: 20px;
    }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #4ade80;
    }
  </style>
</head>
<body>

<h1>Street Clash</h1>
<p>WASD to move • Mouse to aim • Left click to shoot • Survive as long as you can.</p>

<div id="gameContainer">
  <canvas id="game" width="800" height="450"></canvas>
  <div id="hud">
    <div>Health: <span id="healthText">100</span></div>
    <div>Score: <span id="scoreText">0</span></div>
  </div>
  <div id="gameOver">
    <div id="gameOverText">Game Over</div>
    <button id="restartBtn">Play Again</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const healthText = document.getElementById('healthText');
  const scoreText = document.getElementById('scoreText');
  const gameOverScreen = document.getElementById('gameOver');
  const gameOverText = document.getElementById('gameOverText');
  const restartBtn = document.getElementById('restartBtn');

  const keys = {};
  let mouseX = canvas.width / 2;
  let mouseY = canvas.height / 2;
  let mouseDown = false;

  const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    r: 16,
    speed: 3,
    health: 100,
  };

  let bullets = [];
  let enemies = [];
  let score = 0;
  let lastShot = 0;
  let spawnTimer = 0;
  let gameRunning = true;

  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
  });

  canvas.addEventListener('mousedown', () => mouseDown = true);
  canvas.addEventListener('mouseup', () => mouseDown = false);

  function resetGame() {
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    player.health = 100;
    bullets = [];
    enemies = [];
    score = 0;
    lastShot = 0;
    spawnTimer = 0;
    gameRunning = true;
    gameOverScreen.style.display = 'none';
  }

  restartBtn.addEventListener('click', resetGame);

  function spawnEnemy() {
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = 0; y = Math.random() * canvas.height; }
    else if (edge === 1) { x = canvas.width; y = Math.random() * canvas.height; }
    else if (edge === 2) { x = Math.random() * canvas.width; y = 0; }
    else { x = Math.random() * canvas.width; y = canvas.height; }

    enemies.push({
      x,
      y,
      r: 14,
      speed: 1.5 + Math.random() * 0.8,
      damage: 10,
    });
  }

  function update(delta) {
    if (!gameRunning) return;

    // Movement
    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;

    const len = Math.hypot(dx, dy);
    if (len > 0) {
      dx /= len;
      dy /= len;
      player.x += dx * player.speed;
      player.y += dy * player.speed;
    }

    // Clamp to canvas
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // Shooting
    lastShot += delta;
    if (mouseDown && lastShot > 150) {
      lastShot = 0;
      const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
      bullets.push({
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * 6,
        vy: Math.sin(angle) * 6,
        r: 4,
      });
    }

    // Update bullets
    bullets.forEach(b => {
      b.x += b.vx;
      b.y += b.vy;
    });
    bullets = bullets.filter(b =>
      b.x > -10 && b.x < canvas.width + 10 &&
      b.y > -10 && b.y < canvas.height + 10
    );

    // Spawn enemies
    spawnTimer += delta;
    if (spawnTimer > 800) {
      spawnTimer = 0;
      spawnEnemy();
    }

    // Update enemies
    enemies.forEach(e => {
      const angle = Math.atan2(player.y - e.y, player.x - e.x);
      e.x += Math.cos(angle) * e.speed;
      e.y += Math.sin(angle) * e.speed;
    });

    // Bullet–enemy collisions
    enemies.forEach((e, ei) => {
      bullets.forEach((b, bi) => {
        const dist = Math.hypot(e.x - b.x, e.y - b.y);
        if (dist < e.r + b.r) {
          enemies.splice(ei, 1);
          bullets.splice(bi, 1);
          score += 10;
        }
      });
    });

    // Enemy–player collisions
    enemies.forEach((e, ei) => {
      const dist = Math.hypot(e.x - player.x, e.y - player.y);
      if (dist < e.r + player.r) {
        enemies.splice(ei, 1);
        player.health -= e.damage;
        if (player.health <= 0) {
          player.health = 0;
          gameRunning = false;
          gameOverText.textContent = `Game Over – Score: ${score}`;
          gameOverScreen.style.display = 'flex';
        }
      }
    });

    // Update HUD
    healthText.textContent = player.health;
    scoreText.textContent = score;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background grid
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#111827';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    // Player
    ctx.save();
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    ctx.translate(player.x, player.y);
    ctx.rotate(angle);
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(0, 0, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, -4, player.r + 6, 8); // gun
    ctx.restore();

    // Bullets
    ctx.fillStyle = '#facc15';
    bullets.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // Enemies
    ctx.fillStyle = '#ef4444';
    enemies.forEach(e => {
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  let lastTime = performance.now();
  function loop(time) {
    const delta = time - lastTime;
    lastTime = time;
    update(delta);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>

</body>
</html>
