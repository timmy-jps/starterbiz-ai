<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stick TD Lite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 12px 0 4px;
      text-align: center;
    }
    p {
      margin: 0 0 10px;
      text-align: center;
      font-size: 13px;
      color: #9ca3af;
    }
    #gameContainer {
      position: relative;
    }
    canvas {
      background: #020617;
      border-radius: 10px;
      border: 2px solid #4b5563;
      image-rendering: pixelated;
    }
    #hud {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 13px;
      text-shadow: 0 0 4px #000;
    }
    #hud div { margin-bottom: 2px; }

    #bottomBar {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .towerBtn {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #4b5563;
      background: #0f172a;
      color: #e5e7eb;
      cursor: pointer;
    }
    .towerBtn.selected {
      border-color: #22c55e;
      box-shadow: 0 0 6px #22c55e;
    }
    .towerBtn span {
      display: block;
      font-size: 11px;
      color: #9ca3af;
    }
    #startWaveBtn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    #startWaveBtn:hover { background: #4ade80; }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
    }
    .panel {
      background: #020617;
      border-radius: 10px;
      border: 1px solid #4b5563;
      padding: 16px 18px;
      width: 260px;
      max-width: 90vw;
      text-align: center;
    }
    .panel h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
    }
    .panel p {
      margin-bottom: 8px;
      font-size: 13px;
    }
    .panel button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    .panel button:hover { background: #4ade80; }
  </style>
</head>
<body>

<h1>Stick TD Lite</h1>
<p>Click a tower, then click near the path to place it • Stop the stick enemies from reaching the end.</p>

<div id="gameContainer">
  <canvas id="game" width="900" height="500"></canvas>

  <div id="hud">
    <div>Lives: <span id="livesText">20</span></div>
    <div>Money: <span id="moneyText">100</span></div>
    <div>Wave: <span id="waveText">1</span></div>
  </div>

  <div id="overlay">
    <div class="panel">
      <h2 id="overlayTitle">Stick TD Lite</h2>
      <p id="overlayText">Place towers and defend the path.</p>
      <button id="overlayBtn">Play</button>
    </div>
  </div>
</div>

<div id="bottomBar">
  <button class="towerBtn" data-type="basic">
    Basic Tower ($50)
    <span>Decent range, normal damage.</span>
  </button>
  <button class="towerBtn" data-type="sniper">
    Sniper Tower ($90)
    <span>Long range, high damage, slow.</span>
  </button>
  <button class="towerBtn" data-type="rapid">
    Rapid Tower ($80)
    <span>Short range, fast fire.</span>
  </button>
  <button id="startWaveBtn">Start Wave</button>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const livesText = document.getElementById('livesText');
  const moneyText = document.getElementById('moneyText');
  const waveText = document.getElementById('waveText');

  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const overlayBtn = document.getElementById('overlayBtn');

  const towerButtons = document.querySelectorAll('.towerBtn');
  const startWaveBtn = document.getElementById('startWaveBtn');

  let lastTime = performance.now();
  let gameRunning = false;
  let placingTowerType = null;

  let lives = 20;
  let money = 100;
  let wave = 1;
  let waveInProgress = false;
  let enemiesToSpawn = 0;
  let spawnTimer = 0;

  const path = [
    { x: -40, y: 250 },
    { x: 150, y: 250 },
    { x: 150, y: 120 },
    { x: 400, y: 120 },
    { x: 400, y: 380 },
    { x: 700, y: 380 },
    { x: 700, y: 200 },
    { x: 940, y: 200 }
  ];

  const enemies = [];
  const towers = [];
  const bullets = [];

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function getPointOnPath(progress) {
    const segCount = path.length - 1;
    const total = segCount;
    const pos = progress * total;
    const idx = Math.floor(pos);
    const t = pos - idx;
    const i = Math.min(idx, segCount - 1);
    const p1 = path[i];
    const p2 = path[i + 1];
    return {
      x: lerp(p1.x, p2.x, t),
      y: lerp(p1.y, p2.y, t)
    };
  }

  function startGame() {
    lives = 20;
    money = 100;
    wave = 1;
    waveInProgress = false;
    enemies.length = 0;
    towers.length = 0;
    bullets.length = 0;
    updateHUD();
    overlay.style.display = 'none';
    gameRunning = true;
  }

  function gameOver() {
    gameRunning = false;
    overlayTitle.textContent = 'Game Over';
    overlayText.textContent = `You reached wave ${wave}.`;
    overlayBtn.textContent = 'Play Again';
    overlay.style.display = 'flex';
  }

  function updateHUD() {
    livesText.textContent = lives;
    moneyText.textContent = money;
    waveText.textContent = wave;
  }

  function startWave() {
    if (waveInProgress || !gameRunning) return;
    waveInProgress = true;
    enemiesToSpawn = 8 + wave * 2;
    spawnTimer = 0;
  }

  function spawnEnemy() {
    const hp = 10 + wave * 3;
    const speed = 0.03 + wave * 0.002;
    enemies.push({
      progress: 0,
      hp,
      maxHp: hp,
      speed,
      reward: 8 + wave * 2
    });
  }

  function placeTower(x, y, type) {
    const costMap = { basic: 50, sniper: 90, rapid: 80 };
    if (money < costMap[type]) return;

    const margin = 30;
    if (x < margin || x > canvas.width - margin || y < margin || y > canvas.height - margin) return;

    const pathWidth = 60;
    for (let i = 0; i < path.length - 1; i++) {
      const p1 = path[i];
      const p2 = path[i + 1];
      const minX = Math.min(p1.x, p2.x) - pathWidth;
      const maxX = Math.max(p1.x, p2.x) + pathWidth;
      const minY = Math.min(p1.y, p2.y) - pathWidth;
      const maxY = Math.max(p1.y, p2.y) + pathWidth;
      if (x > minX && x < maxX && y > minY && y < maxY) {
        return;
      }
    }

    money -= costMap[type];

    let stats;
    if (type === 'basic') {
      stats = { range: 130, fireRate: 700, damage: 6, color: '#22c55e' };
    } else if (type === 'sniper') {
      stats = { range: 260, fireRate: 1400, damage: 18, color: '#38bdf8' };
    } else if (type === 'rapid') {
      stats = { range: 110, fireRate: 250, damage: 3, color: '#f97316' };
    }

    towers.push({
      x, y,
      type,
      range: stats.range,
      fireRate: stats.fireRate,
      damage: stats.damage,
      color: stats.color,
      lastShot: 0
    });

    updateHUD();
  }

  towerButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      towerButtons.forEach(b => b.classList.remove('selected'));
      const type = btn.getAttribute('data-type');
      if (placingTowerType === type) {
        placingTowerType = null;
      } else {
        placingTowerType = type;
        btn.classList.add('selected');
      }
    });
  });

  canvas.addEventListener('click', e => {
    if (!placingTowerType) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    placeTower(x, y, placingTowerType);
  });

  startWaveBtn.addEventListener('click', startWave);
  overlayBtn.addEventListener('click', startGame);

  function update(delta) {
    if (!gameRunning) return;

    const dt = delta;

    if (waveInProgress) {
      spawnTimer += dt;
      if (spawnTimer > 600 && enemiesToSpawn > 0) {
        spawnTimer = 0;
        spawnEnemy();
        enemiesToSpawn--;
      }
      if (enemiesToSpawn <= 0 && enemies.length === 0) {
        waveInProgress = false;
        wave++;
        updateHUD();
      }
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.progress += e.speed * (dt / 16.67);
      if (e.progress >= 1) {
        enemies.splice(i, 1);
        lives--;
        if (lives <= 0) {
          lives = 0;
          updateHUD();
          gameOver();
          return;
        }
        updateHUD();
      }
    }

    towers.forEach(t => {
      t.lastShot += dt;
      if (t.lastShot < t.fireRate) return;

      let target = null;
      let bestProgress = -1;
      enemies.forEach(e => {
        const pos = getPointOnPath(e.progress);
        const dx = pos.x - t.x;
        const dy = pos.y - t.y;
        const dist = Math.hypot(dx, dy);
        if (dist <= t.range && e.progress > bestProgress) {
          bestProgress = e.progress;
          target = { enemy: e, pos };
        }
      });

      if (target) {
        t.lastShot = 0;
        const angle = Math.atan2(target.pos.y - t.y, target.pos.x - t.x);
        bullets.push({
          x: t.x,
          y: t.y,
          vx: Math.cos(angle) * 0.6,
          vy: Math.sin(angle) * 0.6,
          damage: t.damage,
          target: target.enemy
        });
      }
    });

    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (!enemies.includes(b.target)) {
        bullets.splice(i, 1);
        continue;
      }
      const pos = getPointOnPath(b.target.progress);
      const dx = pos.x - b.x;
      const dy = pos.y - b.y;
      const dist = Math.hypot(dx, dy);
      const speed = 0.9 * (delta / 16.67);
      if (dist < 6) {
        b.target.hp -= b.damage;
        if (b.target.hp <= 0) {
          const reward = b.target.reward;
          money += reward;
          enemies.splice(enemies.indexOf(b.target), 1);
          updateHUD();
        }
        bullets.splice(i, 1);
      } else {
        b.x += (dx / dist) * speed * 16.67;
        b.y += (dy / dist) * speed * 16.67;
      }
    }
  }

  function drawPath() {
    ctx.lineWidth = 40;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#111827';
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();

    ctx.lineWidth = 18;
    ctx.strokeStyle = '#1f2937';
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#020617');
    grad.addColorStop(1, '#020617');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawPath();

    towers.forEach(t => {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(148,163,184,0.15)';
      ctx.lineWidth = 1;
      ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#020617';
      ctx.fillRect(t.x - 4, t.y - 10, 8, 20);
    });

    enemies.forEach(e => {
      const pos = getPointOnPath(e.progress);
      ctx.strokeStyle = '#e5e7eb';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 10);
      ctx.lineTo(pos.x, pos.y + 10);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y - 4);
      ctx.lineTo(pos.x - 6, pos.y + 4);
      ctx.moveTo(pos.x, pos.y - 4);
      ctx.lineTo(pos.x + 6, pos.y + 4);
      ctx.stroke();

      const hpRatio = e.hp / e.maxHp;
      const barW = 26;
      ctx.fillStyle = '#111827';
      ctx.fillRect(pos.x - barW / 2, pos.y - 20, barW, 4);
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(pos.x - barW / 2, pos.y - 20, barW * hpRatio, 4);
    });

    bullets.forEach(b => {
      ctx.fillStyle = '#facc15';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function loop(time) {
    const delta = time - lastTime;
    lastTime = time;
    update(delta);
    draw();
    requestAnimationFrame(loop);
  }

  overlay.style.display = 'flex';
  requestAnimationFrame(loop);
</script>

</body>
</html>
